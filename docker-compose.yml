services:
  mysql:
    image: mysql:8.0
    container_name: wb_sync_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wb_sync
      MYSQL_USER: wb_user
      MYSQL_PASSWORD: wb_secret
    volumes:
      - wb_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wb_mysql_data:
